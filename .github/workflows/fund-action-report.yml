name: Fund Action Report

on:
  schedule:
    # Wake early and redundantly; actual delivery is restricted to Beijing 14:02-14:12.
    - cron: "48 5 * * 1-5"
    - cron: "53 5 * * 1-5"
    - cron: "58 5 * * 1-5"
    - cron: "3 6 * * 1-5"
    - cron: "8 6 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  report:
    uses: ./.github/workflows/daily-report.yml
    with:
      session: fund_action
      scheduled_run: ${{ github.event_name == 'schedule' }}
      delivery_target: "14:07"
      delivery_tolerance_minutes: 5
      silent_failure: ${{ github.event_name == 'schedule' }}
    secrets: inherit
