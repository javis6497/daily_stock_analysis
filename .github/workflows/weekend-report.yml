name: Weekend Quant Report

on:
  schedule:
    # Wake early and redundantly; actual delivery is restricted to Beijing 09:32-09:42.
    - cron: "18 1 * * 6,0"
    - cron: "23 1 * * 6,0"
    - cron: "28 1 * * 6,0"
    - cron: "33 1 * * 6,0"
    - cron: "38 1 * * 6,0"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  report:
    uses: ./.github/workflows/daily-report.yml
    with:
      session: weekend_news
      scheduled_run: ${{ github.event_name == 'schedule' }}
      delivery_target: "09:37"
      delivery_tolerance_minutes: 5
    secrets: inherit
