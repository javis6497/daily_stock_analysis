name: Daily Quant Report

on:
  schedule:
    # Beijing 08:30, Monday-Friday.
    - cron: "30 0 * * 1-5"
    # Beijing 16:30, Monday-Friday.
    - cron: "30 8 * * 1-5"
  workflow_dispatch:
    inputs:
      session:
        description: "Report session"
        required: true
        default: "premarket"
        type: choice
        options:
          - premarket
          - postmarket

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      WATCHLIST_YAML: ${{ secrets.WATCHLIST_YAML }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Prepare private watchlist config
        shell: bash
        run: |
          if [ -n "$WATCHLIST_YAML" ]; then
            printf '%s' "$WATCHLIST_YAML" > config/watchlist.yml
          else
            cp config/watchlist.example.yml config/watchlist.yml
          fi

      - name: Determine report session
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SESSION=${{ github.event.inputs.session }}" >> "$GITHUB_ENV"
          elif [ "${{ github.event.schedule }}" = "30 0 * * 1-5" ]; then
            echo "SESSION=premarket" >> "$GITHUB_ENV"
          else
            echo "SESSION=postmarket" >> "$GITHUB_ENV"
          fi

      - name: Run tests
        run: python -m pytest

      - name: Generate and send report
        shell: bash
        run: |
          if [ -n "$DINGTALK_WEBHOOK" ]; then
            python -m stock_quant report --session "$SESSION" --config config/watchlist.yml --send
          else
            python -m stock_quant report --session "$SESSION" --config config/watchlist.yml --dry-run
          fi
