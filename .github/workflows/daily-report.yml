name: Daily Quant Report

on:
  workflow_dispatch:
    inputs:
      session:
        description: "Report session"
        required: true
        default: "premarket"
        type: choice
        options:
          - premarket
          - postmarket
          - fund_action
          - weekend_news
  workflow_call:
    inputs:
      session:
        description: "Report session"
        required: true
        type: string
      scheduled_run:
        description: "Whether this was triggered by a scheduled wrapper workflow"
        required: false
        default: false
        type: boolean
      delivery_target:
        description: "Beijing delivery target in HH:MM"
        required: false
        default: ""
        type: string
      delivery_tolerance_minutes:
        description: "Allowed delivery drift before and after the target"
        required: false
        default: 5
        type: number

concurrency:
  group: daily-quant-report-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      WATCHLIST_YAML: ${{ secrets.WATCHLIST_YAML }}
      ENABLE_PAGES: ${{ vars.ENABLE_PAGES }}
      DASHBOARD_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
      SCHEDULED_RUN: ${{ inputs.scheduled_run == true }}
      DELIVERY_TARGET: ${{ inputs.delivery_target }}
      DELIVERY_TOLERANCE_MINUTES: ${{ inputs.delivery_tolerance_minutes }}
      MARKET_DATA_CACHE_DIR: .market-data-cache

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Prepare private watchlist config
        shell: bash
        run: |
          if [ -n "$WATCHLIST_YAML" ]; then
            printf '%s' "$WATCHLIST_YAML" > config/watchlist.yml
          else
            cp config/watchlist.example.yml config/watchlist.yml
          fi

      - name: Determine report session
        shell: bash
        run: |
          echo "SESSION=${{ inputs.session || github.event.inputs.session || 'premarket' }}" >> "$GITHUB_ENV"

      - name: Set Beijing report date
        id: report-meta
        shell: bash
        run: |
          report_date="$(TZ=Asia/Shanghai date +%F)"
          echo "REPORT_DATE=$report_date" >> "$GITHUB_ENV"
          echo "cache_key=report-sent-${SESSION}-${report_date}" >> "$GITHUB_OUTPUT"

      - name: Restore scheduled send marker
        id: sent-cache
        if: env.SCHEDULED_RUN == 'true'
        uses: actions/cache/restore@v4
        with:
          path: .report-sent
          key: ${{ steps.report-meta.outputs.cache_key }}

      - name: Run tests
        if: env.SCHEDULED_RUN != 'true'
        run: python -m pytest

      - name: Restore dashboard history
        id: dashboard-cache
        if: env.SCHEDULED_RUN != 'true' || steps.sent-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: site
          key: dashboard-site-${{ env.REPORT_DATE }}-${{ env.SESSION }}-${{ github.run_id }}
          restore-keys: dashboard-site-

      - name: Restore market data cache
        if: env.SCHEDULED_RUN != 'true' || steps.sent-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: .market-data-cache
          key: market-data-${{ env.REPORT_DATE }}-${{ env.SESSION }}-${{ github.run_id }}
          restore-keys: market-data-

      - name: Generate and send report
        if: env.SCHEDULED_RUN != 'true' || steps.sent-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          pages_flag=""
          delivery_args=()
          if [ "$ENABLE_PAGES" = "true" ]; then
            pages_flag="--pages-enabled"
          fi
          if [ "$SCHEDULED_RUN" = "true" ] && [ -n "$DELIVERY_TARGET" ]; then
            delivery_args+=(--delivery-target "$DELIVERY_TARGET")
            delivery_args+=(--delivery-tolerance-minutes "$DELIVERY_TOLERANCE_MINUTES")
          fi
          if [ -n "$DINGTALK_WEBHOOK" ]; then
            python -m stock_quant report --session "$SESSION" --config config/watchlist.yml --send --archive-dir reports --ledger-dir reports/ledger --dashboard-dir site $pages_flag "${delivery_args[@]}"
          elif [ "$SCHEDULED_RUN" = "true" ]; then
            echo "DINGTALK_WEBHOOK is required for a scheduled delivery" >&2
            exit 1
          else
            python -m stock_quant report --session "$SESSION" --config config/watchlist.yml --dry-run --archive-dir reports --ledger-dir reports/ledger --dashboard-dir site $pages_flag
          fi

      - name: Write scheduled delivery receipt
        id: delivery-marker
        if: env.SCHEDULED_RUN == 'true' && steps.sent-cache.outputs.cache-hit != 'true' && success()
        shell: bash
        run: |
          mkdir -p .report-sent
          printf 'sent %s on %s; target=%s; completed=%s\n' "$SESSION" "$REPORT_DATE" "$DELIVERY_TARGET" "$(TZ=Asia/Shanghai date --iso-8601=seconds)" > ".report-sent/${{ steps.report-meta.outputs.cache_key }}"

      - name: Save scheduled delivery receipt
        if: env.SCHEDULED_RUN == 'true' && steps.sent-cache.outputs.cache-hit != 'true' && steps.delivery-marker.outcome == 'success'
        uses: actions/cache/save@v4
        with:
          path: .report-sent
          key: ${{ steps.report-meta.outputs.cache_key }}

      - name: Upload report artifact
        if: (env.SCHEDULED_RUN != 'true' || steps.sent-cache.outputs.cache-hit != 'true') && success()
        uses: actions/upload-artifact@v4
        with:
          name: daily-quant-report-${{ env.SESSION }}-${{ env.REPORT_DATE }}
          path: |
            reports
            site
          if-no-files-found: ignore

      - name: Configure Pages
        if: (env.SCHEDULED_RUN != 'true' || steps.sent-cache.outputs.cache-hit != 'true') && success() && vars.ENABLE_PAGES == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: (env.SCHEDULED_RUN != 'true' || steps.sent-cache.outputs.cache-hit != 'true') && success() && vars.ENABLE_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Pages
        if: (env.SCHEDULED_RUN != 'true' || steps.sent-cache.outputs.cache-hit != 'true') && success() && vars.ENABLE_PAGES == 'true'
        uses: actions/deploy-pages@v4

      - name: Save dashboard history
        if: (env.SCHEDULED_RUN != 'true' || steps.sent-cache.outputs.cache-hit != 'true') && success()
        uses: actions/cache/save@v4
        with:
          path: site
          key: dashboard-site-${{ env.REPORT_DATE }}-${{ env.SESSION }}-${{ github.run_id }}

      - name: Save market data cache
        if: (env.SCHEDULED_RUN != 'true' || steps.sent-cache.outputs.cache-hit != 'true') && success()
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: .market-data-cache
          key: market-data-${{ env.REPORT_DATE }}-${{ env.SESSION }}-${{ github.run_id }}

      - name: Notify failure
        if: failure() && env.DINGTALK_WEBHOOK != '' && (env.SCHEDULED_RUN != 'true' || steps.delivery-marker.outcome != 'success') && (env.SCHEDULED_RUN != 'true' || steps.sent-cache.outputs.cache-hit != 'true')
        shell: bash
        run: |
          report_date="${REPORT_DATE:-$(TZ=Asia/Shanghai date +%F)}"
          session="${SESSION:-unknown}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          python -m stock_quant notify-failure --session "$session" --report-date "$report_date" --run-url "$run_url" --message "Daily Quant Report failed; target=${DELIVERY_TARGET:-manual}, tolerance=+/-${DELIVERY_TOLERANCE_MINUTES:-5} minutes"
