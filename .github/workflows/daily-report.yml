name: Daily Quant Report

on:
  schedule:
    # Beijing 08:41, Monday-Friday.
    - cron: "41 0 * * 1-5"
    # Beijing 08:58, Monday-Friday fallback.
    - cron: "58 0 * * 1-5"
    # Beijing 09:13, Monday-Friday fallback.
    - cron: "13 1 * * 1-5"
    # Beijing 09:47, Monday-Friday catch-up check.
    - cron: "47 1 * * 1-5"
    # Beijing 14:11, Monday-Friday.
    - cron: "11 6 * * 1-5"
    # Beijing 14:26, Monday-Friday fallback.
    - cron: "26 6 * * 1-5"
    # Beijing 14:44, Monday-Friday fallback.
    - cron: "44 6 * * 1-5"
    # Beijing 16:41, Monday-Friday.
    - cron: "41 8 * * 1-5"
    # Beijing 16:58, Monday-Friday fallback.
    - cron: "58 8 * * 1-5"
    # Beijing 17:13, Monday-Friday fallback.
    - cron: "13 9 * * 1-5"
    # Beijing 09:41, Saturday-Sunday.
    - cron: "41 1 * * 6,0"
    # Beijing 09:58, Saturday-Sunday fallback.
    - cron: "58 1 * * 6,0"
    # Beijing 10:13, Saturday-Sunday fallback.
    - cron: "13 2 * * 6,0"
  workflow_dispatch:
    inputs:
      session:
        description: "Report session"
        required: true
        default: "premarket"
        type: choice
        options:
          - premarket
          - postmarket
          - fund_action
          - weekend_news

concurrency:
  group: daily-quant-report-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  report:
    runs-on: ubuntu-latest
    env:
      DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      WATCHLIST_YAML: ${{ secrets.WATCHLIST_YAML }}
      ENABLE_PAGES: ${{ vars.ENABLE_PAGES }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Prepare private watchlist config
        shell: bash
        run: |
          if [ -n "$WATCHLIST_YAML" ]; then
            printf '%s' "$WATCHLIST_YAML" > config/watchlist.yml
          else
            cp config/watchlist.example.yml config/watchlist.yml
          fi

      - name: Determine report session
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "SESSION=${{ github.event.inputs.session }}" >> "$GITHUB_ENV"
          elif [ "${{ github.event.schedule }}" = "41 0 * * 1-5" ] || [ "${{ github.event.schedule }}" = "58 0 * * 1-5" ] || [ "${{ github.event.schedule }}" = "13 1 * * 1-5" ] || [ "${{ github.event.schedule }}" = "47 1 * * 1-5" ]; then
            echo "SESSION=premarket" >> "$GITHUB_ENV"
          elif [ "${{ github.event.schedule }}" = "11 6 * * 1-5" ] || [ "${{ github.event.schedule }}" = "26 6 * * 1-5" ] || [ "${{ github.event.schedule }}" = "44 6 * * 1-5" ]; then
            echo "SESSION=fund_action" >> "$GITHUB_ENV"
          elif [ "${{ github.event.schedule }}" = "41 8 * * 1-5" ] || [ "${{ github.event.schedule }}" = "58 8 * * 1-5" ] || [ "${{ github.event.schedule }}" = "13 9 * * 1-5" ]; then
            echo "SESSION=postmarket" >> "$GITHUB_ENV"
          elif [ "${{ github.event.schedule }}" = "41 1 * * 6,0" ] || [ "${{ github.event.schedule }}" = "58 1 * * 6,0" ] || [ "${{ github.event.schedule }}" = "13 2 * * 6,0" ]; then
            echo "SESSION=weekend_news" >> "$GITHUB_ENV"
          else
            echo "::error::Unsupported schedule: ${{ github.event.schedule }}"
            exit 1
          fi

      - name: Set Beijing report date
        id: report-meta
        shell: bash
        run: |
          report_date="$(TZ=Asia/Shanghai date +%F)"
          echo "REPORT_DATE=$report_date" >> "$GITHUB_ENV"
          echo "cache_key=report-sent-${SESSION}-${report_date}" >> "$GITHUB_OUTPUT"

      - name: Restore scheduled send marker
        id: sent-cache
        if: github.event_name == 'schedule'
        uses: actions/cache/restore@v4
        with:
          path: .report-sent
          key: ${{ steps.report-meta.outputs.cache_key }}

      - name: Run tests
        if: github.event_name != 'schedule' || steps.sent-cache.outputs.cache-hit != 'true'
        run: python -m pytest

      - name: Restore dashboard history
        id: dashboard-cache
        if: github.event_name != 'schedule' || steps.sent-cache.outputs.cache-hit != 'true'
        uses: actions/cache/restore@v4
        with:
          path: site
          key: dashboard-site-${{ env.REPORT_DATE }}-${{ env.SESSION }}-${{ github.run_id }}
          restore-keys: dashboard-site-

      - name: Generate and send report
        if: github.event_name != 'schedule' || steps.sent-cache.outputs.cache-hit != 'true'
        shell: bash
        run: |
          pages_flag=""
          if [ "$ENABLE_PAGES" = "true" ]; then
            pages_flag="--pages-enabled"
          fi
          if [ -n "$DINGTALK_WEBHOOK" ]; then
            python -m stock_quant report --session "$SESSION" --config config/watchlist.yml --send --archive-dir reports --ledger-dir reports/ledger --dashboard-dir site $pages_flag
          else
            python -m stock_quant report --session "$SESSION" --config config/watchlist.yml --dry-run --archive-dir reports --ledger-dir reports/ledger --dashboard-dir site $pages_flag
          fi

      - name: Upload report artifact
        if: (github.event_name != 'schedule' || steps.sent-cache.outputs.cache-hit != 'true') && success()
        uses: actions/upload-artifact@v4
        with:
          name: daily-quant-report-${{ env.SESSION }}-${{ env.REPORT_DATE }}
          path: |
            reports
            site
          if-no-files-found: ignore

      - name: Configure Pages
        if: (github.event_name != 'schedule' || steps.sent-cache.outputs.cache-hit != 'true') && success() && vars.ENABLE_PAGES == 'true'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: (github.event_name != 'schedule' || steps.sent-cache.outputs.cache-hit != 'true') && success() && vars.ENABLE_PAGES == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy Pages
        if: (github.event_name != 'schedule' || steps.sent-cache.outputs.cache-hit != 'true') && success() && vars.ENABLE_PAGES == 'true'
        uses: actions/deploy-pages@v4

      - name: Save dashboard history
        if: (github.event_name != 'schedule' || steps.sent-cache.outputs.cache-hit != 'true') && success()
        uses: actions/cache/save@v4
        with:
          path: site
          key: dashboard-site-${{ env.REPORT_DATE }}-${{ env.SESSION }}-${{ github.run_id }}

      - name: Notify failure
        if: failure() && env.DINGTALK_WEBHOOK != '' && (github.event_name != 'schedule' || steps.sent-cache.outputs.cache-hit != 'true')
        shell: bash
        run: |
          report_date="${REPORT_DATE:-$(TZ=Asia/Shanghai date +%F)}"
          session="${SESSION:-unknown}"
          run_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          python -m stock_quant notify-failure --session "$session" --report-date "$report_date" --run-url "$run_url" --message "Daily Quant Report workflow failed"

      - name: Write scheduled send marker
        if: github.event_name == 'schedule' && steps.sent-cache.outputs.cache-hit != 'true' && success()
        shell: bash
        run: |
          mkdir -p .report-sent
          printf 'sent %s on %s\n' "$SESSION" "$REPORT_DATE" > ".report-sent/${{ steps.report-meta.outputs.cache_key }}"

      - name: Save scheduled send marker
        if: github.event_name == 'schedule' && steps.sent-cache.outputs.cache-hit != 'true' && success()
        uses: actions/cache/save@v4
        with:
          path: .report-sent
          key: ${{ steps.report-meta.outputs.cache_key }}
