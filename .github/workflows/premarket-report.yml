name: Premarket Quant Report

on:
  schedule:
    # Wake early and redundantly; actual delivery is restricted to Beijing 08:32-08:42.
    - cron: "18 0 * * 1-5"
    - cron: "23 0 * * 1-5"
    - cron: "28 0 * * 1-5"
    - cron: "33 0 * * 1-5"
    - cron: "38 0 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  report:
    uses: ./.github/workflows/daily-report.yml
    with:
      session: premarket
      scheduled_run: ${{ github.event_name == 'schedule' }}
      delivery_target: "08:37"
      delivery_tolerance_minutes: 5
      silent_failure: ${{ github.event_name == 'schedule' }}
    secrets: inherit
