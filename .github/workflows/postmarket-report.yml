name: Postmarket Quant Report

on:
  schedule:
    # Wake early and redundantly; actual delivery is restricted to Beijing 16:32-16:42.
    - cron: "18 8 * * 1-5"
    - cron: "23 8 * * 1-5"
    - cron: "28 8 * * 1-5"
    - cron: "33 8 * * 1-5"
    - cron: "38 8 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  report:
    uses: ./.github/workflows/daily-report.yml
    with:
      session: postmarket
      scheduled_run: ${{ github.event_name == 'schedule' }}
      delivery_target: "16:37"
      delivery_tolerance_minutes: 5
      silent_failure: ${{ github.event_name == 'schedule' }}
    secrets: inherit
